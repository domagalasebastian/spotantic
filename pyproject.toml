[project]
name = "PySpotify"
version = "0.1.0"
description = "Async Spotify API client"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "aiohttp>=3.11",
    "pydantic>=2.0",
    "pydantic-settings>=2.9.0",
]

[tool.black]
line-length = 120
target-version = ['py312']

[tool.isort]
profile = "black"
line_length = 120
force_single_line = true
include_trailing_comma = false
use_parentheses = true

[tool.pyright]
exclude = ["**/__pycache__"]
